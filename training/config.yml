#                                 GLOBAL CONFIGURATION
# =====================================================================================
# Consommé par dags/tasks/train_model.py (DAG Airflow "dag_train_model") : chaque entrée de
# models_to_run est fusionnée avec default_training puis lance un `python train.py ...` dédié
# (un run = un modèle, cf. training/README.md). Ce fichier n'est PAS lu par train.py lui-même
# (le script reste utilisable seul, un modèle à la fois, via --model/--epochs/etc. ou .env).
#
# EXPERIMENT_NAME / MLFLOW_URI / TRAINING_S3_BUCKET ne sont volontairement pas répétés ici : le DAG
# les reçoit comme n'importe quelle autre tâche Airflow, via les variables d'environnement du
# conteneur (cf. dags/config.py, même pattern que pour le DAG RAG).

# --- Default training hyperparameters (appliqués à chaque modèle, sauf surcharge locale) ---
default_training:
  dataset_name: "inrae"
  optimizer: "Adam"
  loss_function: "CrossEntropyLoss"
  batch_size: 32
  epochs: 25
  learning_rate: 0.0001
  weight_decay: 0.0001
  patience: 5


#                                    MODELS TO RUN
# =====================================================================================
# Modèles actifs pour le premier sweep Airflow : resnet18/resnet34 seulement (décision
# utilisateur). Les autres entrées sont conservées commentées ci-dessous, pas supprimées.

models_to_run:

  # --- ResNets ---
  - name: "resnet18"
    input_size: 224
    freeze_base: True
    description: "ResNet-18, Transfer learning"

  - name: "resnet34"
    input_size: 224
    freeze_base: True
    description: "ResNet-34, Transfer learning"

