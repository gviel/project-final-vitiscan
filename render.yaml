# Blueprint Render (Infrastructure as Code) pour api/ et rag-llm/.
# ui/ est déployé séparément sur Streamlit Community Cloud (pas de service Docker Render) —
# voir docs/deploiement-render-streamlit.md pour la procédure complète.
#
# Usage : Render Dashboard -> New -> Blueprint -> sélectionner ce dépôt -> Render détecte ce
# fichier automatiquement. Les variables marquées `sync: false` seront demandées une seule fois,
# à la création du Blueprint (valeurs à saisir manuellement, jamais committées).
#
# `projects` (au lieu de `services` au premier niveau) range les services dans le Project Render
# "jedha-AIA-Vitiscan" (regroupement par application, au-dessus du Workspace "My Workspace" -
# lui non représentable en Blueprint, implicite au Workspace dans lequel on connecte ce dépôt
# depuis le Dashboard), avec un `environment` par service selon son rôle :
# - "Production" : vitiscan-api + vitiscan-rag-llm (branche Neon prod, cf. plus bas).
# - "Test" : vitiscan-rag-llm-test (branche Neon test), créé à la main dans l'UI Render avant ce
#   commit - le nom doit rester "Test" pour que le Blueprint s'y rattache au lieu d'en recréer un.

projects:
  - name: jedha-AIA-Vitiscan
    environments:
      - name: Production
        services:
          - name: vitiscan-api
            type: web
            runtime: docker
            plan: free
            rootDir: api
            # rootDir scope l'auto-deploy (un push touchant seulement ui/ ou training/ ne
            # redéploiera pas ce service) MAIS rend aussi dockerfilePath/dockerContext relatifs à
            # rootDir, pas à la racine du repo (doc officielle Render : "you need to update
            # dockerfilePath and dockerContext ... to be relative to the new root directory") -
            # contrairement à ce qu'on pensait initialement. `dockerfilePath: api/Dockerfile`
            # faisait résoudre Render sur api/api/Dockerfile (inexistant) -> échec de déploiement
            # ("lstat api/api: no such file or directory").
            dockerfilePath: Dockerfile
            dockerContext: .
            healthCheckPath: /health
            envVars:
              - key: MLFLOW_TRACKING_URI
                value: https://gviel-mlflow37.hf.space
              - key: MLFLOW_MODEL_ID
                sync: false  # id du Logged Model MLflow à servir, cf. api/.env.template
              - key: AWS_ACCESS_KEY_ID
                sync: false
              - key: AWS_SECRET_ACCESS_KEY
                sync: false
              - key: AWS_DEFAULT_REGION
                value: eu-west-3
              - key: AWS_REGION
                value: eu-west-3

          - name: vitiscan-rag-llm
            type: web
            runtime: docker
            plan: free
            rootDir: rag-llm
            # cf. commentaire du service vitiscan-api ci-dessus : dockerfilePath/dockerContext
            # relatifs à rootDir (rag-llm), pas à la racine du repo.
            dockerfilePath: Dockerfile
            dockerContext: .
            healthCheckPath: /health
            envVars:
              - key: HF_API_URL
                value: https://router.huggingface.co/v1/chat/completions
              - key: HF_API_TOKEN
                sync: false
              - key: HF_MODEL_ID
                value: meta-llama/Meta-Llama-3-8B-Instruct
              # --- Ancien Weaviate/ngrok, désactivé depuis la migration pgvector (cf.
              # docs/deploiement-render-streamlit.md) — conservé commenté pour référence
              # historique ---
              # - key: WEAVIATE_URL
              #   sync: false
              # - key: WEAVIATE_API_KEY
              #   sync: false
              # - key: WEAVIATE_CUSTOM_HTTP_HOST
              #   sync: false
              # - key: WEAVIATE_CUSTOM_HTTP_PORT
              #   value: "443"
              # - key: WEAVIATE_CUSTOM_HTTP_SECURE
              #   value: "true"
              # - key: WEAVIATE_CUSTOM_GRPC_HOST
              #   sync: false
              # - key: WEAVIATE_CUSTOM_GRPC_PORT
              #   sync: false
              # - key: WEAVIATE_CUSTOM_GRPC_SECURE
              #   value: "false"

              # Neon (Postgres managé + extension pgvector) — persistant, gratuit, joignable
              # directement depuis Render sans tunnel. Utiliser l'URL "pooled" fournie par Neon
              # (hôte suffixé -pooler), branche "prod". Cf. docs/deploiement-render-streamlit.md.
              - key: DATABASE_URL
                sync: false

      - name: Test
        services:
          # Cible HTTP pour la porte de qualité golden_prompts_gate
          # (dags/tasks/rag_ingestion.py) : dag_rag_ingestion ingère les nouveaux documents dans
          # la branche Neon "test" puis interroge ce service (RAG_LLM_TEST_URL, cf.
          # airflow/.env.template) via /solutions pour rejouer les golden prompts contre le vrai
          # service déployé (Dockerfile, env Render...), pas seulement contre les données -
          # détecte aussi les bugs de déploiement (ex. rootDir/OOM, cf. docs/refactoring.md), pas
          # uniquement les régressions de contenu. Jamais exposé aux utilisateurs finaux ni
          # référencé par ui/ - seule différence avec vitiscan-rag-llm : DATABASE_URL pointe sur
          # la branche Neon "test".
          - name: vitiscan-rag-llm-test
            type: web
            runtime: docker
            plan: free
            rootDir: rag-llm
            dockerfilePath: Dockerfile
            dockerContext: .
            healthCheckPath: /health
            envVars:
              - key: HF_API_URL
                value: https://router.huggingface.co/v1/chat/completions
              - key: HF_API_TOKEN
                sync: false
              - key: HF_MODEL_ID
                value: meta-llama/Meta-Llama-3-8B-Instruct
              # Branche Neon "test" (pas "prod") - URL pooled, cf. dags/config.py::DATABASE_URL_TEST.
              - key: DATABASE_URL
                sync: false
