# Stack minimale pour développer rag-llm/ isolément (juste Postgres/pgvector).
# Pour la stack complète (api + ui + rag-llm + postgres), voir le docker-compose.yml racine.

services:
  postgres:
    # pg18 : même version majeure que Neon (confirmé "PostgreSQL 18.4" lors du test de migration).
    image: pgvector/pgvector:pg18
    container_name: vitiscan_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: vitiscan
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD manquant, cf. .env.template racine}"
      POSTGRES_DB: vitiscan-rag-db-dev
    ports:
      - "5433:5432"
    volumes:
      # pg18+ : les images postgres attendent un mount sur /var/lib/postgresql (pas .../data),
      # cf. https://github.com/docker-library/postgres/pull/1259.
      - vitiscan_postgres_dev_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitiscan -d vitiscan-rag-db-dev"]
      interval: 10s
      retries: 5
      start_period: 10s

volumes:
  vitiscan_postgres_dev_data:
