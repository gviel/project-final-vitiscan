---
# Stack Airflow dédiée à Vitiscan — Airflow 3.2.2 — LocalExecutor — auto-contenue.
#
# ATTENTION isolation : une stack Airflow pour un autre projet (Fraud Detection) tourne déjà en
# permanence sur cette machine, avec le nom de projet Compose implicite "airflow" (nom de son
# répertoire), donc des conteneurs nommés airflow_airflow-scheduler_1, etc., le port hôte 8080,
# et une image fraud-detection-airflow:latest. Pour ne jamais entrer en collision avec cette
# stack (ne surtout pas l'arrêter/la perturber) :
#   - COMPOSE_PROJECT_NAME=vitiscan_airflow forcé par start.sh/stop.sh (jamais le nom du dossier)
#   - container_name explicite et préfixé "vitiscan_airflow_" sur CHAQUE service
#   - image custom "vitiscan-airflow:latest" (distincte de "fraud-detection-airflow:latest")
#   - port hôte de l'apiserver : 8090 (8080 déjà pris par Fraud Detection)
#   - noms de volumes distincts
#
# Le DAG dag_rag_ingestion (dags/dag_rag_ingestion.py) ingère dans une branche Neon (Postgres/
# pgvector) "test", puis si OK dans la branche Neon "prod" utilisée par la stack applicative
# principale — Neon est joignable directement par DATABASE_URL, pas besoin de résolution DNS par
# nom de service ni de host.docker.internal (contrairement à l'ancien Weaviate "prod" du
# docker-compose.yml racine, cf. service weaviate-test ci-dessous, en sommeil).
#
# Usage : ./start.sh | ./stop.sh

x-airflow-common:
  &airflow-common
  image: vitiscan-airflow:latest
  build:
    context: ..
    dockerfile: airflow/Dockerfile
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    # Doit être identique sur tous les conteneurs Airflow (signe les JWT scheduler <-> apiserver).
    # Valeur distincte de celle de la stack Fraud Detection (sans quoi rien ne casserait, chaque
    # stack a son propre réseau/volumes, mais autant éviter tout secret partagé entre projets).
    AIRFLOW__API_AUTH__JWT_SECRET: "vitiscan-airflow-dev-secret-key-change-in-prod"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    # Nom de service Compose ("airflow-apiserver"), pas le container_name ("vitiscan_airflow_apiserver")
    # ni un nom inventé ("vitiscan-airflow-apiserver") : seul le nom de service est résolu par le
    # DNS interne Docker Compose. Bug pré-existant trouvé en testant réellement le DAG (toute tâche
    # LocalExecutor échouait en "Temporary failure in name resolution" en tentant de rapporter son
    # statut au serveur API).
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # Variables métier lues par dags/config.py
    RAG_S3_BUCKET: "${RAG_S3_BUCKET:-s3-vitiscan-data}"
    RAG_S3_PREFIX: "${RAG_S3_PREFIX:-knowledge/current/}"
    RAG_LLM_DIR: "/opt/airflow/rag-llm"
    # Branches Neon (Postgres/pgvector) test/prod, créées manuellement au préalable (branching
    # natif Neon) - remplacent les 2 instances Weaviate test/prod.
    DATABASE_URL_TEST: "${DATABASE_URL_TEST:?DATABASE_URL_TEST manquant, cf. .env.template}"
    DATABASE_URL_PROD: "${DATABASE_URL_PROD:?DATABASE_URL_PROD manquant, cf. .env.template}"
    # URL Render du service vitiscan-rag-llm-test (cf. render.yaml) : golden_prompts_gate y rejoue
    # les golden prompts en HTTP réel (branche Neon test) avant de promouvoir vers la prod - teste
    # aussi le service réellement déployé, pas seulement les données (cf.
    # dags/tasks/rag_ingestion.py::run_golden_prompts_gate).
    RAG_LLM_TEST_URL: "${RAG_LLM_TEST_URL:?RAG_LLM_TEST_URL manquant, cf. .env.template}"
    DAG_RAG_INGESTION_CRON: "${DAG_RAG_INGESTION_CRON:-0 * * * *}"
    AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
    AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
    AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-eu-west-3}"
    # Variables métier lues par dags/config.py pour dag_train_model (sweep multi-modèles CNN)
    TRAINING_DIR: "/opt/airflow/training"
    # Sous work/ (bind-mount ci-dessous, pas un volume Docker nommé) : cache visible/inspectable
    # depuis l'hôte, persistant entre recréations de conteneur - dataset téléchargé une seule fois
    # (cf. data_utils.py::prepare_dataset), pas besoin de le retélécharger ni de gérer un volume
    # Docker séparé.
    TRAINING_DATA_DIR: "/opt/airflow/work/training-data"
    MLFLOW_URI: "${MLFLOW_URI:-https://gviel-mlflow37.hf.space/}"
    EXPERIMENT_NAME: "${EXPERIMENT_NAME:-Vitiscan_CNN_Resnet_INRAE}"
    TRAINING_S3_BUCKET: "${TRAINING_S3_BUCKET:-s3-vitiscan-data}"
    # Répertoire de travail générique (cf. dags/tasks/rag_ingestion.py : cache fixe de téléchargement
    # des documents knowledge, réutilisé/écrasé à chaque run plutôt qu'un tempfile.mkdtemp() -
    # aucune purge manuelle nécessaire après coup).
    WORK_DIR: "/opt/airflow/work"
  volumes:
    - ../dags:/opt/airflow/dags
    - ../rag-llm:/opt/airflow/rag-llm:ro
    - ../training:/opt/airflow/training:ro
    # Writable, séparé de ../training (montée en lecture seule) : répertoire de travail commun
    # (dataset d'entraînement en cache, téléchargement des documents knowledge) - bind-mount vers
    # work/ à la racine du dépôt plutôt qu'un volume Docker nommé, pour rester visible/inspectable
    # depuis l'hôte et partageable avec un run local (venv) de training/ si besoin.
    - ../work:/opt/airflow/work
    - ./logs:/opt/airflow/logs
    - ./config:/opt/airflow/config
    - ./plugins:/opt/airflow/plugins
  # EN SOMMEIL depuis la migration pgvector — servait à joindre le Weaviate "prod" du
  # docker-compose.yml racine (projet Compose distinct) via son port publié sur l'hôte ; Neon est
  # désormais joignable directement par DATABASE_URL_PROD, plus besoin de host.docker.internal.
  # extra_hosts:
  #   - "host.docker.internal:host-gateway"
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    airflow-db:
      condition: service_healthy

services:

  airflow-db:
    image: postgres:16-alpine
    container_name: vitiscan_airflow_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - vitiscan_airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # EN SOMMEIL depuis la migration pgvector — l'isolation "test" est désormais assurée par une
  # vraie branche Neon (DATABASE_URL_TEST), plus besoin d'un Weaviate local dédié à cette stack.
  # Conservé commenté pour retour arrière éventuel.
  #
  # weaviate-test:
  #   image: semitechnologies/weaviate:1.27.4
  #   container_name: vitiscan_weaviate_test
  #   environment:
  #     QUERY_DEFAULTS_LIMIT: 20
  #     AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
  #     PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
  #     DEFAULT_VECTORIZER_MODULE: "none"
  #     CLUSTER_HOSTNAME: "vitiscan-weaviate-test"
  #   ports:
  #     - "8091:8080"
  #     - "50052:50051"
  #   volumes:
  #     - vitiscan_weaviate_test_data:/var/lib/weaviate
  #   healthcheck:
  #     test: ["CMD-SHELL", "wget -qO- http://localhost:8080/v1/.well-known/ready || exit 1"]
  #     interval: 10s
  #     retries: 5
  #     start_period: 20s
  #   restart: unless-stopped

  airflow-apiserver:
    <<: *airflow-common
    container_name: vitiscan_airflow_apiserver
    command: api-server
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: vitiscan_airflow_scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    container_name: vitiscan_airflow_dag_processor
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    container_name: vitiscan_airflow_triggerer
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    container_name: vitiscan_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username airflow \
          --password airflow \
          --firstname Vitiscan \
          --lastname Admin \
          --role Admin \
          --email admin@vitiscan.local || true
        echo "Init terminé."
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      HOME: /home/airflow
    user: "0:0"
    restart: "no"

volumes:
  vitiscan_airflow_db_data:
  # EN SOMMEIL depuis la migration pgvector (cf. service weaviate-test ci-dessus, commenté).
  # vitiscan_weaviate_test_data:
