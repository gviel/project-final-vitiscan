# Stack locale complète : api (CNN) + rag-llm (RAG-LLM) + ui (Streamlit) + postgres/pgvector (local).
# MLflow reste externe (déployé sur Hugging Face Spaces), non géré ici.
#
# Démarrage : docker-compose up --build (v1 legacy, seule disponible dans l'environnement de dev
# de référence ; docker compose v2 fonctionne aussi si le plugin est présent)
# (chaque service lit son .env dans son propre dossier ; copier les .env.template au préalable)
#
# Noms de conteneurs explicitement préfixés "vitiscan_" pour ne jamais entrer en collision avec
# d'autres stacks locales (ex: Fraud Detection, qui utilise le préfixe "fraud_"/"airflow_").
# NB : pas de clé `name:` top-level ici (Compose Spec v2) car l'environnement de dev ne dispose
# que de docker-compose v1 (legacy), qui ne la supporte pas.

services:

  postgres:
    # pg18 : même version majeure que Neon (confirmé "PostgreSQL 18.4" lors du test de migration),
    # pour rester au plus proche de la prod en dev local.
    image: pgvector/pgvector:pg18
    container_name: vitiscan_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vitiscan
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD manquant, cf. .env.template racine}"
      POSTGRES_DB: vitiscan_knowledge
    ports:
      - "5433:5432"   # 5432 déjà pris par vitiscan_airflow_db côté hôte si les 2 stacks tournent ensemble
    volumes:
      - vitiscan_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitiscan -d vitiscan_knowledge"]
      interval: 10s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: vitiscan_api
    env_file:
      - api/.env
    ports:
      - "4000:4000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 10s
      retries: 5
      start_period: 30s

  rag-llm:
    build:
      context: .
      dockerfile: rag-llm/Dockerfile
    container_name: vitiscan_rag_llm
    env_file:
      - rag-llm/.env
    environment:
      # override : à l'intérieur du réseau docker-compose, postgres est joignable par son nom de service
      DATABASE_URL: "postgresql://vitiscan:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD manquant, cf. .env.template racine}@postgres:5432/vitiscan_knowledge"
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health || exit 1"]
      interval: 10s
      retries: 5
      start_period: 30s

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    container_name: vitiscan_ui
    env_file:
      - ui/.env
    environment:
      # override : à l'intérieur du réseau docker-compose, les API sont joignables par leur nom de service
      API_DIAGNO: http://api:4000
      API_SOLUTIONS: http://rag-llm:9000
    ports:
      - "8502:8501"    # 8501 déjà utilisé par le dashboard Fraud Detection
    depends_on:
      - api
      - rag-llm
    restart: unless-stopped

  # EN SOMMEIL depuis la migration pgvector — le Weaviate qu'il exposait n'existe plus en dev
  # local (remplacé par le service "postgres" ci-dessus, pas besoin de tunnel pour Render
  # puisque Neon est joignable directement par DATABASE_URL). Conservé commenté pour retour
  # arrière éventuel, cf. docs/simulation-prod-ngrok.md.
  #
  # ngrok:
  #   image: ngrok/ngrok:latest
  #   container_name: vitiscan_ngrok
  #   restart: unless-stopped
  #   profiles: ["ngrok"]
  #   environment:
  #     # Défaut vide (pas `:?` obligatoire) : sinon docker-compose refuserait TOUTE commande, même
  #     # sur les autres services, tant que NGROK_AUTHTOKEN n'est pas renseigné (l'interpolation de
  #     # variables est évaluée pour tous les services, indépendamment du profile actif).
  #     NGROK_AUTHTOKEN: "${NGROK_AUTHTOKEN:-}"
  #   volumes:
  #     - ./ngrok/ngrok.yml:/etc/ngrok.yml:ro
  #   command: start --all --config /etc/ngrok.yml
  #   ports:
  #     - "4040:4040"    # interface web ngrok (statut des tunnels, adresse gRPC attribuée)
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  vitiscan_postgres_data:
