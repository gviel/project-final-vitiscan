# Stack locale complète : api (CNN) + rag-llm (RAG-LLM) + ui (Streamlit) + postgres/pgvector (local).
# MLflow reste externe (déployé sur Hugging Face Spaces), non géré ici.
#
# Démarrage : docker-compose up --build (v1 legacy, seule disponible dans l'environnement de dev
# de référence ; docker compose v2 fonctionne aussi si le plugin est présent)
# (chaque service lit son .env dans son propre dossier ; copier les .env.template au préalable)
#
# Noms de conteneurs explicitement préfixés "vitiscan_" pour ne jamais entrer en collision avec
# d'autres stacks locales (ex: Fraud Detection, qui utilise le préfixe "fraud_"/"airflow_").
# NB : pas de clé `name:` top-level ici (Compose Spec v2) car l'environnement de dev ne dispose
# que de docker-compose v1 (legacy), qui ne la supporte pas.

services:

  # EN SOMMEIL pour ce test de photo-labeling-dashboard : conflit de container_name avec une autre
  # stack déjà active sur cette machine (vitiscan_postgres/vitiscan_rag_llm tournant depuis une
  # autre session/worktree). rag-llm/labeling utilisent temporairement leur propre DATABASE_URL
  # (branche Neon prod pour ui/labeling - un seul environnement pour ces deux apps ; branche Neon
  # "validation" ou "prod" selon rag-llm/.env.dev) au lieu de ce postgres local, ce qui garantit
  # aussi que ui/ et labeling/ voient les mêmes données. Décommenter pour revenir au postgres local
  # (et remettre les overrides DATABASE_URL/depends_on retirés plus bas).
  #
  # postgres:
  #   # pg18 : même version majeure que Neon (confirmé "PostgreSQL 18.4" lors du test de migration),
  #   # pour rester au plus proche de la prod en dev local.
  #   image: pgvector/pgvector:pg18
  #   container_name: vitiscan_postgres
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: vitiscan
  #     POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD manquant, cf. .env.template racine}"
  #     # "vitiscan-rag-db-dev" en local, "vitiscan-rag-db" sur les branches Neon test/prod (cf.
  #     # rag-llm/.env.template) - dev suffixé pour ne pas confondre avec les 2 branches Neon.
  #     POSTGRES_DB: vitiscan-rag-db-dev
  #   ports:
  #     - "5433:5432"   # 5432 déjà pris par vitiscan_airflow_db côté hôte si les 2 stacks tournent ensemble
  #   volumes:
  #     # pg18+ : les images postgres attendent un mount sur /var/lib/postgresql (pas .../data),
  #     # cf. https://github.com/docker-library/postgres/pull/1259 - testé en conditions réelles,
  #     # le montage sur .../data fait planter l'initdb en boucle sur pg18.
  #     - vitiscan_postgres_data:/var/lib/postgresql
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U vitiscan -d vitiscan-rag-db-dev"]
  #     interval: 10s
  #     retries: 5
  #     start_period: 10s

  api:
    build:
      # context = api/ (pas la racine du repo) : même convention que render.yaml (rootDir: api),
      # les COPY du Dockerfile sont relatifs à api/ depuis la correction du bug de déploiement
      # Render ("lstat api/api: no such file or directory" - dockerfilePath/dockerContext sont
      # relatifs à rootDir, pas à la racine du repo, cf. commentaire dans render.yaml).
      context: ./api
      dockerfile: Dockerfile
    container_name: vitiscan_api
    env_file:
      - api/.env
    ports:
      - "4000:4000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 10s
      retries: 5
      start_period: 30s

  rag-llm:
    build:
      # context = rag-llm/ : cf. commentaire du service "api" ci-dessus (même convention render.yaml).
      context: ./rag-llm
      dockerfile: Dockerfile
    container_name: vitiscan_rag_llm
    env_file:
      - rag-llm/.env.dev
    environment:
      APP_ENV: dev
    # EN SOMMEIL (cf. commentaire du service postgres plus haut) : DATABASE_URL n'est plus forcé
    # sur le postgres local ici - rag-llm/.env.dev fournit directement la branche Neon "validation".
    ports:
      - "9000:9000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health || exit 1"]
      interval: 10s
      retries: 5
      start_period: 30s

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    container_name: vitiscan_ui
    env_file:
      - ui/.env
    environment:
      # override : à l'intérieur du réseau docker-compose, les API sont joignables par leur nom de service
      API_DIAGNO: http://api:4000
      API_SOLUTIONS: http://rag-llm:9000
    ports:
      - "8502:8501"    # 8501 déjà utilisé par le dashboard Fraud Detection
    depends_on:
      - api
      - rag-llm
    restart: unless-stopped

  labeling:
    build:
      # context = labeling/ (contrairement à ui/, ce composant n'a pas besoin de fichiers hors de
      # son propre dossier : db/schema.sql lui appartient, cf. labeling/README.md).
      context: ./labeling
      dockerfile: Dockerfile
    container_name: vitiscan_labeling
    env_file:
      - labeling/.env
    environment:
      API_DIAGNO: http://api:4000
    # EN SOMMEIL (cf. commentaire du service postgres plus haut) : DATABASE_URL n'est plus forcé
    # sur le postgres local ici - labeling/.env fournit directement la branche Neon prod (même
    # valeur que ui/.env, indispensable pour que labeling/ voie les photos écrites par ui/ - un
    # seul environnement pour ces deux apps, cf. ui/.env.template).
    ports:
      - "8503:8501"    # 4000=api, 9000=rag-llm, 8502=ui, 5433=postgres déjà pris
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  # EN SOMMEIL depuis la migration pgvector — le Weaviate qu'il exposait n'existe plus en dev
  # local (remplacé par le service "postgres" ci-dessus, pas besoin de tunnel pour Render
  # puisque Neon est joignable directement par DATABASE_URL). Conservé commenté pour retour
  # arrière éventuel, cf. docs/simulation-prod-ngrok.md.
  #
  # ngrok:
  #   image: ngrok/ngrok:latest
  #   container_name: vitiscan_ngrok
  #   restart: unless-stopped
  #   profiles: ["ngrok"]
  #   environment:
  #     # Défaut vide (pas `:?` obligatoire) : sinon docker-compose refuserait TOUTE commande, même
  #     # sur les autres services, tant que NGROK_AUTHTOKEN n'est pas renseigné (l'interpolation de
  #     # variables est évaluée pour tous les services, indépendamment du profile actif).
  #     NGROK_AUTHTOKEN: "${NGROK_AUTHTOKEN:-}"
  #   volumes:
  #     - ./ngrok/ngrok.yml:/etc/ngrok.yml:ro
  #   command: start --all --config /etc/ngrok.yml
  #   ports:
  #     - "4040:4040"    # interface web ngrok (statut des tunnels, adresse gRPC attribuée)
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  vitiscan_postgres_data:
